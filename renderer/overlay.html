<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Celery Overlay</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
<div id="overlay-root">

  <div id="overlay-header">
    <div id="overlay-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 3C7 3 3 7 3 12s4 9 9 9 9-4 9-9-4-9-9-9z" stroke="#4ade80" stroke-width="1.5" fill="none"/>
        <path d="M9 12l2 2 4-4" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <div id="overlay-title">Celery Mod Manager</div>
        <div id="overlay-instance">Loading...</div>
      </div>
    </div>
    <button id="overlay-close" title="Close (F8)">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div id="overlay-search-wrap">
    <input id="overlay-search" type="text" placeholder="Search mods...">
  </div>

  <div id="overlay-filters">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="enabled">Enabled</button>
    <button class="filter-tab" data-filter="disabled">Disabled</button>
  </div>

  <div id="overlay-mod-list">
    <div id="overlay-loading">Loading mods...</div>
  </div>

  <div id="overlay-footer">
    <span id="overlay-footer-note">Changes take effect on next launch</span>
    <span id="overlay-count"></span>
  </div>

</div>
<script src="overlay.js"></script>
</body>
</html>
